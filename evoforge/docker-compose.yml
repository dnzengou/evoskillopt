version: '3.8'

services:
  evoforge:
    build: .
    ports:
      - "8000:8000"
    environment:
      - EVOFORGE_MODE=auto
      - EVOFORGE_ENABLE_METALEARNING=true
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
